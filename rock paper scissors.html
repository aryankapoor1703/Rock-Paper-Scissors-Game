<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <p>Play Against the Computer. First One to Reach 5 Points  Wins!</p><br>
    <p>
        <b>Choose Your Move:</b>
    </p>
    <br>
    <div id="choice">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
    </div>
    
    <br>
    <hr>
    <h2>Round Result</h2>
    <p id="you">Your Choice: </p><br>
    <p id="computer">Computer Choice: </p><br>
    <p id="result">Result: </p><br>
    <hr>
    <h2>Score (Reach 5 Points)</h2>
    <p id="yourscore">You: 0</p><br>
    <p id="computerscore">Computer: 0</p>
    <hr>
    <h3 id="winner">Winner: </h3><br>
    <button id="again">Play Again</button>
</body>
</html>
<script src="rock paper scissors.js"></script>
